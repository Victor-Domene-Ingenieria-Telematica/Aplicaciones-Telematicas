<!DOCTYPE html>
<html lang="es-ES">
<head>
    <title>Practica 1.5 - Formularios(Reserva de vehículo)</title>
    <meta charset="UTF-8">
</head>
<body>

    <h1>Reservar un Vehículo</h1>
    <h2>Seleccione las opciones para su próximo viaje</h2>

    <form method="POST">
        <fieldset>
            <legend><strong>Detalles de la Reserva</strong></legend>

            Oficina de recogida:
            <select name="oficina">
                <option value="madrid">Madrid - Atocha</option>
                <option value="barcelona">Barcelona - El Prat</option>
                <option value="valencia">Valencia - Centro</option>
            </select>
            <br><br>

            <label for="fecha_recogida">Fecha de recogida:</label>
            <input type="date" name="fecha_recogida" id="fecha_recogida">
            <br><br>

            <label for="hora_recogida">Hora de recogida:</label>
            <input type="time" name="hora_recogida" id="hora_recogida">
            <br><br>

            <label for="pasajeros">Número de pasajeros:</label>
            <input type="number" name="pasajeros" id="pasajeros" min="1" max="9">
            <br><br>

            <label for="color_coche">Color preferido del coche (orientativo):</label>
            <input type="color" name="color_coche" id="color_coche">
            <br><br>

            <label for="carnet">Subir copia del carnet de conducir (PDF o JPG):</label>
            <input type="file" name="carnet" id="carnet">
            <br><br>

            <label for="comentarios">Peticiones especiales (sillas de bebé, GPS, etc.):</label><br>
            <textarea name="comentarios" id="comentarios" rows="4" cols="50" placeholder="Escriba aquí sus comentarios..."></textarea>

        </fieldset>

        <br>
        <input type="submit" value="Confirmar Reserva">

    </form>

</body>
</html>
