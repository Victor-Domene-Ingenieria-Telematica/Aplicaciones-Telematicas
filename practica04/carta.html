<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Fondo con un ligero degradado */
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }
        
        .idiomas-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 12px; }
        
        .btn-flag { 
            border: none; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 12px; 
            border-radius: 50%; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            transition: 0.3s all; 
            cursor: pointer; 
            font-size: 1.5rem;
            backdrop-filter: blur(5px);
        }
        
        /* TÍTULO PRINCIPAL */
        .header-principal {
            margin-top: 50px;
            margin-bottom: 50px;
            text-align: center;
        }
        
        .main-title { 
            font-size: 7rem; 
            font-weight: 600; 
            text-align: center;
            text-transform: uppercase; 
            margin-top: 60px; 
            margin-bottom: 50px;
        }
        
        /* SECCIÓN DE CATEGORÍA */
        .categoria-seccion { 
            background: #1a1a1a; 
            border-radius: 25px; 
            padding: 0; 
            margin-bottom: 60px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            overflow: hidden; 
            border: 1px solid #333;
        }

        .categoria-header {
            background: #000; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            gap: 20px;
        }
        
        .img-categoria { 
            width: 100px !important; 
            height: 100px !important; 
            object-fit: contain; 
            border-radius: 15px; 
        }

        .categoria-titulo { 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: #ffffff; 
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* GRID DE PLATOS */
        .platos-grid { 
            padding: 30px;
            background: #1a1a1a; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .plato-card { 
            background: #2d2d2d; 
            border: 1px solid #444;
            color: white;
            /* Alineamos foto y texto perfectamente */
            display: flex; 
            align-items: center; 
            padding: 15px; 
            border-radius: 12px;
        }
        
        .plato-nombre { color: #ffffff; }

        .plato-card:hover { 
            transform: scale(1.05); 
            border-color: #0984e3; 
            box-shadow: 0 15px 30px rgba(9, 132, 227, 0.15);
            cursor: pointer; 
        }
        
        .img-producto { 
            width: 85px !important; 
            height: 85px !important; 
            object-fit: cover; 
            margin-right: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .plato-nombre { 
            font-weight: 600; 
            color: #cccccc; 
            font-size: 1.15rem; 
        }

        .oculto { display: none !important; }

        .filtros-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn-filtro {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-filtro:hover {
            background: #333;
            border-color: #d4af37;
        }

        /* --- ESTILOS DE LA TABLA DE PEDIDOS Y BOTONES NUEVOS --- */
        #zona-pedidos { 
            padding: 30px; 
            background: #111; 
            position: sticky; 
            top: 100px; 
        }
        .table-dark { background-color: transparent; }

        /* Botón de restar unidad */
        .btn-restar { background: #dc3545; color: white; border: none; border-radius: 5px; padding: 2px 10px; font-weight: bold; transition: 0.2s; }
        .btn-restar:hover { background: #c82333; transform: scale(1.1); }
        
        /* Botón de vaciar carrito entero */
        .btn-vaciar { width: 100%; margin-top: 15px; background: #dc3545; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-vaciar:hover { background: #c82333; }

    </style>
    <title>Auto-Gourmet</title>
</head>
<body>

    <div class="idiomas-container">
        <button id="btn-es" class="btn-flag">🇪🇸</button>
        <button id="btn-en" class="btn-flag">🇬🇧</button>
        <button id="btn-fr" class="btn-flag">🇫🇷</button>
        <button id="btn-de" class="btn-flag">🇩🇪</button>
    </div>

    <div class="container-fluid px-lg-5 pb-5">
        <header class="header-principal">
            <h1 class="main-title">Auto-Gourmet</h1>
        </header>

        <div class="filtros-container">
            <button id="btn-alcohol" class="btn-filtro"></button>
            <button id="btn-especialidades" class="btn-filtro"></button>
        </div>

        <div class="row">
            
            <div class="col-lg-8">
                <div id="contenedor-menu"></div>
            </div>

            <div class="col-lg-4">
                <div id="zona-pedidos" class="categoria-seccion" style="display: none;">
                    <h2 id="titulo-pedidos" class="categoria-titulo mb-4" style="text-align: center; font-size: 2rem; color: #d4af37;">Tu Pedido</h2>
                    <div class="px-4 pb-2">
                        <table id="tabla-pedidos" class="table table-dark table-hover text-center align-middle">
                        </table>
                        
                        <button id="btn-vaciar" class="btn-vaciar"></button>
                    </div>
                </div>
            </div>

        </div> 
    </div>
    
    <script src="carta.js"></script>
</body>
</html>
