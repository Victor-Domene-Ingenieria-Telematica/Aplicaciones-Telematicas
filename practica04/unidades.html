<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <title>Práctica 4.2</title>
</head>
<body>
    <div class="container mt-4 text-center">        
        <div>
            <h1>Distancia del servidor: <span id="distancia-servidor">1</span> metros</h1>
        </div>

        <div class="mb-3 mt-4">
            <label for="unidad-destino">Elige a qué convertir:</label>
            <select id="unidad-destino" class="form-select w-50 mx-auto">
                <option value="m">Metros (m)</option>
                <option value="cm">Centímetros (cm)</option>
                <option value="in">Pulgadas (in)</option>
                <option value="yd">Yardas (yd)</option>
            </select>
        </div>

        <button id="btn-calcular" class="btn btn-primary mt-2">Calcular</button>

        <br><br>
        <p id="texto-resultado" class="fw-bold"></p>
    </div>

    <script src="unidades.js"></script>
</body>
</html>
