<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validación de Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 bg-white p-4 rounded border">
                
                <h3>Práctica 4.9 - Contraseña</h3>
                
                <div class="mb-3 mt-4">
                    <label for="inputPassword" class="form-label">Escribe tu contraseña:</label>
                    <input type="password" class="form-control" id="inputPassword">
                    <div id="mensaje-global" class="mt-2 fw-bold"></div>
                </div>

                <p class="mt-4">Requisitos:</p>
                <ul>
                    <li id="req-longitud" class="text-danger">Al menos 8 caracteres</li>
                    <li id="req-minuscula" class="text-danger">Al menos 1 letra minúscula</li>
                    <li id="req-mayuscula" class="text-danger">Al menos 1 letra mayúscula</li>
                    <li id="req-numero" class="text-danger">Al menos 1 número</li>
                    <li id="req-especial" class="text-danger">Al menos 1 carácter especial</li>
                </ul>

            </div>
        </div>
    </div>

    <script src="../practica03/valida.js"></script> 

    <script src="valida.js"></script>
</body>
</html>
