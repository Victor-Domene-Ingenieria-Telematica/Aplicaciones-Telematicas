<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <title>ej23</title>
    <style>
        body {
            background-color: lightcyan;
        }

        /* Podemos poner p.p1 o .p1 ya que todos son parrafos */
        p.p1 {
            color: blueviolet;
        }

        .p2 {
            text-align: center;
        }

        /* Esta regla no se aplica porque no hay ningun parrafo id="'3" */
        p#p3 {
            color: white;
        }

        .p3 {
            text-decoration: underline;
        }

        .p4 {
            font-size: 150%;
        }

        .p5 {
            font-style: italic;
        }

        .p6 {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <p class="p1">Este es el parrafo 1</p>
    <p class="p2">Este es el parrafo 2</p>
    <p class="p3">Este es el parrafo 3</p>
    <p class="p4">Este es el parrafo 4</p>
    <p class="p5">Este es el parrafo 5</p>
    <p class="p6">Este es el parrafo 6</p>
</body>
</html>
