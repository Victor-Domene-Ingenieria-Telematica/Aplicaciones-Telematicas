<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    
    <title>P2.9. Formularios Bootstrap</title>
</head>
<body>

    <div class="container mt-5 mb-5">
        
        <h1 class="mb-4">Registro de Nuevo Cliente</h1>
        <h2 class="fs-5 text-muted mb-3">Rellene el siguiente formulario para darse de alta en nuestra plataforma</h2>

        <form>
            
            <fieldset class="border p-4 mb-4 bg-light">
                <legend class="float-none px-2 fw-bold text-primary">Datos Personales</legend>

                <div class="mb-3">
                    <label class="form-label" for="nombre">Nombre completo:</label>
                    <input class="form-control" type="text" name="nombre" id="nombre">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="email">Correo electrónico:</label>
                    <input class="form-control" type="email" name="email" placeholder="correo@gmail.com" id="email">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Contraseña:</label>
                    <input class="form-control" type="password" name="password" id="password">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="telefono">Teléfono móvil:</label>
                    <input class="form-control" type="tel" name="telefono" id="telefono">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="nacimiento">Fecha de nacimiento:</label>
                    <input class="form-control" type="date" name="nacimiento" id="nacimiento">
                </div>

                <fieldset class="mt-4">
                    <legend class="form-label fs-6">Método de contacto preferido:</legend>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="contacto_email" name="contacto" value="email" checked>
                        <label class="form-check-label" for="contacto_email">Por Email</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="contacto_tel" name="contacto" value="telefono">
                        <label class="form-check-label" for="contacto_tel">Por Teléfono</label>
                    </div>
                </fieldset>
            
            </fieldset>

            <fieldset class="border p-4 mb-4 bg-light">
                <legend class="float-none px-2 fw-bold text-primary">Términos y Condiciones</legend>
                
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="terminos" name="terminos" required> 
                    <label class="form-check-label" for="terminos">Acepto los términos y condiciones de la empresa</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="boletin" name="boletin"> 
                    <label class="form-check-label" for="boletin">Deseo recibir ofertas y promociones</label>
                </div>
            </fieldset>

            <button type="submit" class="btn btn-primary">Completar Registro</button>

        </form>

    </div> </body>
</html>
