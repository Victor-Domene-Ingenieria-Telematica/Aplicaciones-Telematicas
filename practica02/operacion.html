<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    
    <title>P2.9. Formularios Bootstrap</title>
</head>
<body class="bg-light">

    <div class="container mt-5 mb-5">
        
        <h1 class="mb-4">Reservar un Vehículo</h1>
        <h2 class="fs-5 text-muted mb-3">Seleccione las opciones para su próximo viaje</h2>

        <form>
            
            <fieldset class="border p-4 mb-4 bg-white shadow-sm">
                <legend class="float-none fw-bold text-primary">Detalles de la Reserva</legend>

                <div class="mb-3">
                    <label class="form-label" for="oficina">Oficina de recogida:</label>
                    <select class="form-select" name="oficina" id="oficina">
                        <option value="madrid">Madrid - Atocha</option>
                        <option value="barcelona">Barcelona - El Prat</option>
                        <option value="valencia">Valencia - Centro</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="fecha_recogida">Fecha de recogida:</label>
                    <input class="form-control" type="date" name="fecha_recogida" id="fecha_recogida">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="hora_recogida">Hora de recogida:</label>
                    <input class="form-control" type="time" name="hora_recogida" id="hora_recogida">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="pasajeros">Número de pasajeros:</label>
                    <input class="form-control" type="number" name="pasajeros" id="pasajeros" min="1" max="9">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="color_coche">Color preferido del coche (orientativo):</label>
                    <input class="form-control form-control-color" type="color" name="color_coche" id="color_coche" value="#000000">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="carnet">Subir copia del carnet de conducir (PDF o JPG):</label>
                    <input class="form-control" type="file" name="carnet" id="carnet">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="comentarios">Peticiones especiales (sillas de bebé, GPS, etc.):</label>
                    <textarea class="form-control" name="comentarios" id="comentarios" rows="4" placeholder="Escriba aquí sus comentarios..."></textarea>
                </div>

            </fieldset>

            <button type="submit" class="btn btn-primary">Confirmar Reserva</button>

        </form>

    </div>

</body>
</html>
